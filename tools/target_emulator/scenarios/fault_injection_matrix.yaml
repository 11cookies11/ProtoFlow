version: "1"

meta:
  name: "Fault Injection Matrix"
  description: "Timeout/drop/jitter/chunk/close/reorder case coverage"

transport_defaults:
  encoding: "utf-8"
  eol: "crlf"

rules:
  - id: drop_once
    when:
      type: exact
      pattern: "PING:DROP"
    drop: true
    once: true

  - id: timeout_window
    when:
      type: exact
      pattern: "PING:TIMEOUT"
    drop: true

  - id: jitter_response
    when:
      type: exact
      pattern: "PING:JITTER"
    delay_ms: 20
    jitter_ms: 60
    respond:
      text: "PONG:JITTER"

  - id: chunk_response
    when:
      type: exact
      pattern: "PING:CHUNK"
    respond:
      text: "PAYLOAD:ABCDEFGHIJKLMNOPQRSTUVWXYZ"
      chunk_bytes: 8
      chunk_interval_ms: 5

  - id: reorder_payload
    when:
      type: exact
      pattern: "PING:REORDER"
    respond:
      text: "SEQ:2,1"

  - id: close_after
    when:
      type: exact
      pattern: "PING:CLOSE"
    respond:
      text: "BYE"
    close_after: true

fallback:
  respond:
    text: "ERROR"
