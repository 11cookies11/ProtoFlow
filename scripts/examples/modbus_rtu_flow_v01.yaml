version: "0.1"

params:
  port: "COM3"
  baud: 115200

session:
  transport: serial
  port: "${port}"
  baud: "${baud}"
  data_bits: 8
  parity: none
  stop_bits: 1
  encoding: ascii
  eol: none

defaults:
  timeout_ms: 2000

steps:
  - id: read_holding
    name: protocol.rpc
    protocol: modbus_rtu
    request:
      op: read_holding
      unit_id: 1
      address: 0
      quantity: 2
    save_as: rtu_read_result

  - id: assert_read_ok
    name: assert
    expr: "${rtu_read_result.ok}"
    message: "modbus rtu read failed"
