name: Build and Release ProtoFlow (MSIX)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_version:
        description: "Version for MSIX package (e.g. v0.3.2)"
        required: false
        default: "v0.0.0-dev"
      include_skill_bundles:
        description: "Fetch SkillForge release bundles before packaging"
        required: false
        default: "true"
      skillforge_source:
        description: "How to resolve SkillForge bundles"
        required: false
        default: "latest-release"
      skillforge_tag:
        description: "SkillForge release tag to fetch when source is specific-tag"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    name: Build MSIX for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Resolve SkillForge bundle mode
        id: skill_bundles
        shell: pwsh
        run: |
          $shouldFetch = $false
          $skillforgeTag = ""
          $skillforgeSource = "latest-release"
          if ("${{ github.event_name }}" -eq "push" -and "${{ startsWith(github.ref, 'refs/tags/') }}" -eq "true") {
            $shouldFetch = $true
            $skillforgeSource = "latest-release"
          }
          elseif ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ github.event.inputs.include_skill_bundles }}" -eq "true") {
            $shouldFetch = $true
            $skillforgeSource = "${{ github.event.inputs.skillforge_source }}"
            if ([string]::IsNullOrWhiteSpace($skillforgeSource)) {
              $skillforgeSource = "latest-release"
            }
            if ($skillforgeSource -eq "specific-tag") {
              $skillforgeTag = "${{ github.event.inputs.skillforge_tag }}"
              if ([string]::IsNullOrWhiteSpace($skillforgeTag)) {
                throw "skillforge_tag is required when skillforge_source is specific-tag."
              }
            }
          }

          "enabled=$($shouldFetch.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "source=$skillforgeSource" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag=$skillforgeTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Download SkillForge release bundles
        if: steps.skill_bundles.outputs.enabled == 'true'
        shell: pwsh
        env:
          SKILLFORGE_REPO: 11cookies11/SkillForge
          SKILLFORGE_SOURCE: ${{ steps.skill_bundles.outputs.source }}
          SKILLFORGE_TAG: ${{ steps.skill_bundles.outputs.tag }}
          SKILLFORGE_READ_TOKEN: ${{ secrets.SKILLFORGE_READ_TOKEN }}
          GITHUB_TOKEN_FALLBACK: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $token = $env:SKILLFORGE_READ_TOKEN
          if ([string]::IsNullOrWhiteSpace($token)) {
            $token = $env:GITHUB_TOKEN_FALLBACK
          }
          if ($env:SKILLFORGE_SOURCE -eq "specific-tag") {
            .\scripts\download_skillforge_release_bundles.ps1 `
              -Repo $env:SKILLFORGE_REPO `
              -Tag $env:SKILLFORGE_TAG `
              -OutputDir ".\build\downloads\skill-bundles" `
              -Token $token
          }
          else {
            .\scripts\download_skillforge_release_bundles.ps1 `
              -Repo $env:SKILLFORGE_REPO `
              -Latest `
              -OutputDir ".\build\downloads\skill-bundles" `
              -Token $token
          }

      - name: Build MSIX package
        env:
          MSIX_CERT_PFX_BASE64: ${{ secrets.MSIX_CERT_PFX_BASE64 }}
          MSIX_CERT_PASSWORD: ${{ secrets.MSIX_CERT_PASSWORD }}
          MSIX_SKIP_SIGN: ${{ secrets.MSIX_SKIP_SIGN }}
          PROTOFLOW_SKILL_BUNDLE_SOURCE: ${{ github.workspace }}\build\downloads\skill-bundles
        run: |
          $skipSign = "${{ secrets.MSIX_SKIP_SIGN }}"
          if ([string]::IsNullOrWhiteSpace($skipSign)) { $skipSign = "true" }
          $env:MSIX_SKIP_SIGN = $skipSign

          $version = "${{ github.event.inputs.build_version }}"
          if ([string]::IsNullOrWhiteSpace($version)) { $version = "${{ github.ref_name }}" }
          .\\scripts\\build_msix.ps1 `
            -Version "$version" `
            -IdentityName "${{ secrets.MSIX_IDENTITY_NAME }}" `
            -Publisher "${{ secrets.MSIX_PUBLISHER }}" `
            -PublisherDisplayName "${{ secrets.MSIX_PUBLISHER_DISPLAY_NAME }}" `
            -DisplayName "${{ secrets.MSIX_DISPLAY_NAME }}"

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v6
        with:
          name: ProtoFlow-${{ github.ref_name }}-msix
          path: |
            dist/msix/*.msix
            dist/msix/cert/*.cer

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: windows-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          path: ./dist
          merge-multiple: true

      - name: Create Release And Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "ProtoFlow ${{ github.ref_name }}"
          body: |
            ## 中文

            本次版本为 ProtoFlow 带来了首批 Skill bundle 支持，重点补齐了技能内容的浏览、打包分发和发布链路集成能力。

            ### 更新内容
            - 新增 `Settings -> Skills` 页面，可浏览本地 Skill bundle。
            - 支持展示 skill 的基础信息，包括名称、版本、类型、分类、标签与路径来源。
            - 支持在界面中预览 `SKILL.md` 内容，并查看 `references` 与 `examples` 文件列表。
            - 开发模式下提供 placeholder skills，便于在没有真实 bundle 时预览和验证界面。
            - 发布构建时可将真实 SkillForge bundle 注入 ProtoFlow 安装包。
            - Release 流程支持自动拉取 SkillForge 的 bundle 产物并参与打包。
            - 默认从 SkillForge 最新 Release 获取 bundle，同时保留手动指定 tag 的能力，便于版本固定和回滚。

            ### 说明
            - 当前版本主要提供 Skill bundle 的浏览与随包分发能力。
            - 在线安装、启停管理、版本管理等更完整的 skill 生命周期能力将在后续版本继续完善。

            ## English

            This release introduces the first Skill bundle experience in ProtoFlow, focusing on skill browsing, packaged distribution, and release pipeline integration.

            ### Highlights
            - Added a new `Settings -> Skills` panel for browsing local Skill bundles.
            - Displayed core skill metadata including name, version, type, category, tags, and bundle paths.
            - Added in-app preview for `SKILL.md`, plus visible `references` and `examples` lists.
            - Introduced placeholder skills for source-based development and UI preview without live bundles.
            - Enabled real SkillForge bundles to be injected into packaged ProtoFlow builds.
            - Updated the release pipeline to fetch SkillForge bundle artifacts automatically during packaging.
            - Defaulted bundle resolution to the latest SkillForge Release, while keeping manual tag pinning for rollback and reproducible builds.

            ### Note
            - This version focuses on Skill bundle browsing and packaged delivery.
            - Full lifecycle features such as online installation, enable/disable controls, and version management will come in future releases.
          files: |
            dist/**/*.msix
            dist/**/*.cer
          fail_on_unmatched_files: false
          overwrite_files: true
